<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A2</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="tabs-page">
    <h1>サービス情報</h1>
    <section class="tabs">
      <input type="radio" name="tab" id="tab-overview" checked>
      <input type="radio" name="tab" id="tab-price">
      <input type="radio" name="tab" id="tab-review">
      <div class="tab-labels">
        <label for="tab-overview">概要</label>
        <label for="tab-price">料金</label>
        <label for="tab-review">レビュー</label>
      </div>
      <div class="tab-panels">
        <div class="tab-panel panel-overview">
          <h2>概要</h2>
          <p>ここに概要の内容を表示します。</p>
        </div>
        <div class="tab-panel panel-price">
          <h2>料金</h2>
          <p>ここに料金の内容を表示します。</p>
        </div>
        <div class="tab-panel panel-review">
          <h2>レビュー</h2>
          <p>ここにレビューの内容を表示します。</p>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
