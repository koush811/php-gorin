<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .content{
        width: 500px;

        height: auto;
        position: relative;
    }
    img{
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    .cursor{
        position: absolute;
        border-radius: 50%;
        background-color: rgba(255, 255, 255, 0.5);
        backdrop-filter: 10px;
        transform: translate(-50%,-50%);
    }
</style>
<body>
    <div class="content">
        <div class="cursor"></div>
        <img src="1-392a39b8.jpg" alt="photo">
    </div>
</body>
<script src="script.js"></script>
</html>
